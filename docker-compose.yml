networks:
  edgenet-network:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  edgenet:
    profiles:
      - edgenet
    build:
      context: .
      dockerfile: Dockerfile.edgenet
      args:
        - BINARY=${BINARY}
        - PLATFORM=${PLATFORM}
    volumes:
      - ./.config/${CHAIN_ID}_edgenet/:/${BINARY}/.${BINARY}/
      - ./cache/:/${BINARY}/cache/
    environment:
      - BINARY=${BINARY}
      - CHAIN_ID=${CHAIN_ID}
      - DENOM=${DENOM}
      - STAKE_DENOM=${STAKE_DENOM}
      - VALIDATOR_MONIKER=validator
      - VALIDATOR_MNEMONIC=${VALIDATOR_MNEMONIC}
      - SNAPSHOT_URL=${SNAPSHOT_URL}
      - FUNDED_ACCOUNTS=${FUNDED_ACCOUNTS}
      - COSMWASM_ADMIN=${COSMWASM_ADMIN}
      - FAUCET_PRIVATE_KEY=${FAUCET_PRIVATE_KEY}
    ports:
      - 26657:26657 # RPC
      - 1317:1317 # LCD
      - 9090:9090 # GRPC
    networks:
      - edgenet-network
    logging: *default-logging
    restart: on-failure

  anvil-base:
    profiles:
      - edgenet
    image: edgenet-anvil:local
    build:
      context: .
      dockerfile: Dockerfile.anvil
    volumes:
      - ./data/84539:/data
    # BLOCK_TIME is whole seconds (anvil's -b flag). EVM_CHAIN_ID is Base
    # mainnet's real chain id (8453) with a digit inserted, a deliberate
    # offset so the fork does not collide with mainnet in wallets and
    # browser extensions.
    environment:
      - CHAIN_NAME=base
      - FORK_RPC_URL=${BASE_FORK_RPC_URL}
      - FORK_BLOCK=${BASE_FORK_BLOCK}
      - BLOCK_TIME=2
      - EVM_CHAIN_ID=84539
      - ANVIL_PORT=8545
    ports:
      - 8545:8545
    networks:
      - edgenet-network
    logging: *default-logging
    restart: on-failure

  anvil-somnia:
    profiles:
      - edgenet
    image: edgenet-anvil:local
    build:
      context: .
      dockerfile: Dockerfile.anvil
    volumes:
      - ./data/50319:/data
    # BLOCK_TIME is whole seconds (anvil's -b flag). EVM_CHAIN_ID is Somnia
    # mainnet's real chain id (5031) with a digit inserted, a deliberate
    # offset so the fork does not collide with mainnet in wallets and
    # browser extensions.
    environment:
      - CHAIN_NAME=somnia
      - FORK_RPC_URL=${SOMNIA_FORK_RPC_URL}
      - FORK_BLOCK=${SOMNIA_FORK_BLOCK}
      - BLOCK_TIME=1
      - EVM_CHAIN_ID=50319
      - ANVIL_PORT=8545
    ports:
      - 8546:8545
    networks:
      - edgenet-network
    logging: *default-logging
    restart: on-failure

  anvil-polygon:
    profiles:
      - edgenet
    image: edgenet-anvil:local
    build:
      context: .
      dockerfile: Dockerfile.anvil
    volumes:
      - ./data/1379:/data
    # BLOCK_TIME is whole seconds (anvil's -b flag). EVM_CHAIN_ID is Polygon
    # mainnet's real chain id (137) with a digit inserted, a deliberate
    # offset so the fork does not collide with mainnet in wallets and
    # browser extensions.
    environment:
      - CHAIN_NAME=polygon
      - FORK_RPC_URL=${POLYGON_FORK_RPC_URL}
      - FORK_BLOCK=${POLYGON_FORK_BLOCK}
      - BLOCK_TIME=2
      - EVM_CHAIN_ID=1379
      - ANVIL_PORT=8545
    ports:
      - 8547:8545
    networks:
      - edgenet-network
    logging: *default-logging
    restart: on-failure

  faucet:
    profiles:
      - edgenet
    container_name: faucet
    build:
      context: ./faucet
    environment:
      - FAUCET_PRIVATE_KEY=${FAUCET_PRIVATE_KEY}
      - LUMEN_RPC_URL=http://edgenet:26657
      - BASE_RPC_URL=http://anvil-base:8545
      - SOMNIA_RPC_URL=http://anvil-somnia:8545
      - POLYGON_RPC_URL=http://anvil-polygon:8545
    ports:
      - 3000:3000
    networks:
      - edgenet-network
    logging: *default-logging
    restart: on-failure
